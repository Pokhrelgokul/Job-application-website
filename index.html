<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="apply_box">
            <h1>
                Job Application
                <span class="title small">(web)</span>
            </h1>
            <form action="">
                <div class="form character">
                    <div class="form_control">
                        <label for="first name">First Name</label>
                        <input 
                        id="first name"
                        name="first name"
                        placeholder="Enter First Name..."
                        />
                    </div>
                    <div class="form_control">
                        <label for=" Last Name">Last Name</label>
                        <input 
                        id="Last name"
                        name="Last  name"
                        placeholder="Enter Last Name..."
                        />
                </div>
                
                    <div class="form_control">
                        <label for=" Email">Last Name</label>
                        <input 
                        type="email"
                        id="Email"
                        name="Email"
                        placeholder="Enter Email.."
                        />
                    </div>
                    <div class="form_control">
                        <label for=" Job_role">Job_role</label>
                        <select id="Job-role"name="Job_role">
                            <option value="">Select job role</option>
                            <option value="frontend">fronten developer</option>
                            <option value="backend">backend developer</option>
                            <option value="full_stack">full_stack developer</option>
                            <option value="ui_ux">ui_ux designer</option>
                        </select>
                        
                        
                    </div>
                    <div class="form_control">
                        <label for="address"></Address></label>
                        <textarea 
                        id="address" 
                        name="address"
                        row="4" 
                        cols="50" 
                        placeholder="Enter Address">

                        </textarea>
                    </div>
                        <div class="form_control">
                        <label for="City">City</label>
                        <input 
                        type="City"
                        id="City"
                        name="City"
                        placeholder="Enter city name.."
                        />
                        </div>
                        <div class="form_control">
                        <label for="pincode"> Pincode</label>
                        <input 
                        type="number"
                        id="pin code"
                        name="pin code"
                        placeholder="Enter pincode number.."
                        />
                        </div>
                     
                        <div class="form_control">
                        <label for="date"> Date</label>
                
                        <input value="2026-05-24" type="Date" id="Date name="Date"
                
                    />
                        </div>
                    
                        <div class="form_control">
                        <label for="upload"> Upload Your CV</label>
                
                        <input type="file" id="upload name="upload
                
                    />
                        </div>
    </div>
                        <div class="button_container">
                            <button type="Sumbit">Apply Now</button>
                        </div>
            </form>
        </div>
    
</body>
</html>
